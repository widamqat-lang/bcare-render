kind = "web"
previewPath = "/"
title = "Insurance Pages"
version = "1.0.0"
id = "artifacts/phishing-pages"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20851

[services.development]
run = "pnpm --filter @workspace/phishing-pages run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phishing-pages", "run", "build" ]
publicDir = "artifacts/phishing-pages/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20851"
BASE_PATH = "/"
