services:
  - type: web
    name: bcare-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
    autoDeploy: true
